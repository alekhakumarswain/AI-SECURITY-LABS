id: model_extraction
title: "Model Extraction & Model Stealing"

description: >
  Model extraction attacks attempt to replicate a proprietary machine 
  learning model by querying it repeatedly and training a surrogate model 
  based on observed outputs. This effectively steals the intellectual 
  property and research investment behind the model without needing 
  direct access to the model weights or training data.

category: "AI Security / Intellectual Property"

affected_targets:

- commercial LLM APIs (OpenAI, Anthropic, etc.)
- specialized fraud detection models
- medical diagnosis classification APIs
- high-frequency trading algorithms
- recommendation and ranking systems
- fine-tuned enterprise models

attack_types:

- name: "Black-box Model Stealing"
  description: >
    Repeated queries are used to build a dataset that mimics the original 
    model behavior. This is often called "copycat" or "surrogate" modeling.

  attack_steps:

  - identify a relevant high-entropy dataset for the target domain
  - systematically query the target API for labels or completions
  - train a local "student" model on the gathered (input, output) pairs

  impact:

  - intellectual property theft
  - unauthorized AI replication
  - loss of competitive advantage

- name: "Confidence Score Exploitation"
  description: >
    Using high-precision probability scores returned by the model to 
    reconstruct its decision boundaries more efficiently than with 
    labels alone.

  attack_steps:

  - send queries and record full probability distributions
  - use the scores to calculate the gradient or decision boundary
  - significantly reduce the number of queries needed to clone the model

  impact:

  - faster model extraction
  - lower cost for the attacker

- name: "Query-based Distillation"
  description: >
    Training a student model using high-quality synthetic outputs 
    generated by the target model, often using an "active learning" 
    subset of queries.

  impact:

  - creation of a lightweight equivalent model
  - avoidance of expensive R&D costs

- name: "Training Data Extraction (Memorization)"
  description: >
    Exploiting the model's tendency to memorize specific training examples 
    to recover verbatim sensitive data from the training corpus.

  impact:

  - sensitive data leakage
  - training privacy breach

impact:

- name: "Intellectual Property Theft"
  description: >
    Competitors launch identical services without the multi-million dollar R&D costs.

- name: "Security Degradation"
  description: >
    Once extracted, the model can be used for offline 'white-box' 
    adversarial testing to find 100% successful bypasses.

- name: "Operational Cost Transfer"
  description: >
    The victim organization pays the inference cost while the 
    attacker builds their own product.

pentesting_testing_steps:

reconnaissance:
- identify exposed inference APIs
- determine response formats (logits vs. text)
- test for rate limits and budgetary caps

exploitation:
- automate large-scale queries using domain-specific prompts
- collect and store (input, output) datasets
- train surrogate models and measure hit-rates

verification:
- compare surrogate accuracy and behavior to the original model
- verify if the student model replicates the teacher's edge cases

detection_methods:

- query rate limiting and anomaly detection
- monitoring for systematic "mapping" patterns (e.g., grid search)
- semantic similarity analysis of incoming requests across sessions
- monitoring IP/Token behavior for abnormal activity spikes

mitigations:

- name: "Output Obfuscation & Quantization"
  description: >
    Reduce the precision of confidence scores (e.g., return 'High' 
    instead of '0.9845') to mask decision weights.

- name: "Watermarking Model Weights"
  description: >
    Embed unique 'trigger outputs' in the model that prove a model 
    was stolen if the clone produces the same unique signature.

- name: "Query Rate Limiting"
  description: >
    Restrict the number of requests per user/token to make extraction 
    economically unfeasible.

- name: "Differential Privacy"
  description: >
    Add controlled statistical noise to outputs to mask individual 
    training influences and decision weights.

ai_security_testing_tools:

- Knockoff Nets
- Counterfit
- ART (Adversarial Robustness Toolbox)
- IBM Adversarial Toolkit
- Garak (for checking prompt-based extraction)

related_attack_categories:

- adversarial_attacks
- financial_abuse
- privacy_leakage
- data_poisoning

